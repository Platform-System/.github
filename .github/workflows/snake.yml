name: Generate Snake Animation

# Vô hiệu hóa chạy tự động để tránh phiền phức mail báo lỗi
on:
  # schedule:
  #   - cron: '0 */6 * * *'
  # push:
  #   branches:
  #     - main
  workflow_dispatch:        # Chỉ cho phép chạy thủ công khi bạn muốn

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake Animation (Platform-System)
        uses: Platane/snk@v3
        with:
          github_user_name: Platform-System
          outputs: |
            dist/contribution-snake-dark.svg?palette=github-dark
            dist/contribution-snake-light.svg?palette=github
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GRAPH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Push Output to Repo
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
