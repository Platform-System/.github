name: Generate Org Activity Graph

# Vô hiệu hóa chạy tự động
on:
  # schedule:
  #   - cron: '0 1 * * *'   # Every day at 01:00 UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate SVG graph
        run: node scripts/generate-graph.js
        env:
          # Use ORG_GRAPH_TOKEN (PAT with read:org + repo scope) for cross-repo access
          # If not set, falls back to GITHUB_TOKEN (may have limited org-read access)
          ORG_GRAPH_TOKEN: ${{ secrets.ORG_GRAPH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push generated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/org-activity.svg
          git diff --staged --quiet || git commit -m "ci: update org activity graph [skip ci]"
          git push
